syntax = "proto3";
package dureq;
option go_package = "github.com/FDK0901/dureq/gen/dureq";

// DispatchJobMsg: sent from SchedulerActor/NotifierActor to DispatcherActor
message DispatchJobMsg {
  string job_id = 1;
  string task_type = 2;
  bytes  payload = 3;
  int32  attempt = 4;
  int32  priority = 5;
  map<string, string> headers = 6;
  int64  deadline_unix_ms = 7;
  int64  dispatched_at_unix_ms = 8;
  string workflow_id = 9;
  string workflow_task = 10;
  string batch_id = 11;
  string batch_item = 12;
  string batch_role = 13;
  int64  schedule_to_start_timeout_ms = 14;
}

// ExecuteJobMsg: sent from DispatcherActor to WorkerSupervisorActor
message ExecuteJobMsg {
  string run_id = 1;
  string job_id = 2;
  string task_type = 3;
  bytes  payload = 4;
  int32  attempt = 5;
  int32  priority = 6;
  map<string, string> headers = 7;
  int64  deadline_unix_ms = 8;
  int64  dispatched_at_unix_ms = 9;
  string workflow_id = 10;
  string workflow_task = 11;
  string batch_id = 12;
  string batch_item = 13;
  string batch_role = 14;
  int64  schedule_to_start_timeout_ms = 15;
}

// JobResultMsg: sent from WorkerSupervisorActor to EventBridgeActor
message JobResultMsg {
  string run_id = 1;
  string job_id = 2;
  string task_type = 3;
  bool   success = 4;
  string error = 5;
  bytes  output = 6;
  int32  attempt = 7;
  string node_id = 8;
  int64  started_at_unix_ms = 9;
  int64  finished_at_unix_ms = 10;
  string workflow_id = 11;
  string batch_id = 12;
}

// WorkerStatusMsg: capacity report from WorkerSupervisorActor to DispatcherActor
message WorkerStatusMsg {
  string node_id = 1;
  int32  running_workers = 2;
  int32  idle_workers = 3;
  int32  max_concurrency = 4;
  repeated string task_types = 5;
  // Explicit sender PID for cases where ctx.Sender() is not preserved
  // through cluster singleton routing.
  string sender_address = 6;
  string sender_id = 7;
}

// DomainEventMsg: domain event bridged between actors and Redis
message DomainEventMsg {
  string type = 1;
  string job_id = 2;
  string run_id = 3;
  string node_id = 4;
  string task_type = 5;
  string error = 6;
  int32  attempt = 7;
  int64  timestamp_unix_ms = 8;
  string batch_id = 9;
  int32  batch_done = 10;
  int32  batch_total = 11;
  int32  batch_failed = 12;
}

// NewJobNotification: client enqueued a job
message NewJobNotification {
  string job_id = 1;
  string task_type = 2;
  int32  priority = 3;
}

// SingletonCheckMsg: periodic singleton health check
message SingletonCheckMsg {}

// RejectJobMsg: worker at capacity
message RejectJobMsg {
  string run_id = 1;
  string job_id = 2;
  string reason = 3;
}

// CancelRunMsg: cancel a specific run
message CancelRunMsg {
  string run_id = 1;
}
