syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/FDK0901/dureq/gen/dureq/monitor/v1;monitorv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "dureq/monitor/v1/common.proto";

// BatchItem is a single item within a batch definition.
message BatchItem {
  string id = 1;
  bytes payload = 2;
}

// BatchDefinition describes a batch processing job.
message BatchDefinition {
  string name = 1;
  optional string onetime_task_type = 2;
  bytes onetime_payload = 3;
  string item_task_type = 4;
  repeated BatchItem items = 5;
  string failure_policy = 6;
  int32 chunk_size = 7;
  RetryPolicy item_retry_policy = 8;
  optional google.protobuf.Duration execution_timeout = 9;
  RetryPolicy retry_policy = 10;
  optional int32 default_priority = 11;
}

// BatchOnetimeState tracks the shared preprocessing step.
message BatchOnetimeState {
  string job_id = 1;
  string status = 2;
  bytes result_data = 3;
  optional string error = 4;
  optional google.protobuf.Timestamp started_at = 5;
  optional google.protobuf.Timestamp finished_at = 6;
}

// BatchItemState tracks an individual item within a batch.
message BatchItemState {
  string item_id = 1;
  string job_id = 2;
  string status = 3;
  optional string error = 4;
  optional google.protobuf.Timestamp started_at = 5;
  optional google.protobuf.Timestamp finished_at = 6;
}

// BatchItemResult stores the output of a single batch item execution.
message BatchItemResult {
  string batch_id = 1;
  string item_id = 2;
  bool success = 3;
  bytes output = 4;
  optional string error = 5;
}

// BatchInstance is the runtime state of a batch being processed.
message BatchInstance {
  string id = 1;
  string name = 2;
  string status = 3;
  BatchDefinition definition = 4;
  BatchOnetimeState onetime_state = 5;
  map<string, BatchItemState> item_states = 6;
  int32 total_items = 7;
  int32 completed_items = 8;
  int32 failed_items = 9;
  int32 running_items = 10;
  int32 pending_items = 11;
  int32 next_chunk_index = 12;
  optional google.protobuf.Timestamp deadline = 13;
  int32 attempt = 14;
  int32 max_attempts = 15;
  google.protobuf.Timestamp created_at = 16;
  google.protobuf.Timestamp updated_at = 17;
  optional google.protobuf.Timestamp completed_at = 18;
}

// --- Batch RPC messages ---

message ListBatchesRequest {
  PaginationRequest pagination = 1;
  optional string status = 2;
}

message ListBatchesResponse {
  repeated BatchInstance batches = 1;
  int32 total = 2;
}

message GetBatchRequest {
  string batch_id = 1;
}

message GetBatchResponse {
  BatchInstance batch = 1;
}

message GetBatchResultsRequest {
  string batch_id = 1;
}

message GetBatchResultsResponse {
  repeated BatchItemResult results = 1;
}

message GetBatchItemResultRequest {
  string batch_id = 1;
  string item_id = 2;
}

message GetBatchItemResultResponse {
  BatchItemResult result = 1;
}

message CancelBatchRequest {
  string batch_id = 1;
}

message CancelBatchResponse {
  string batch_id = 1;
}

message RetryBatchRequest {
  string batch_id = 1;
  bool retry_failed_only = 2;
}

message RetryBatchResponse {
  string batch_id = 1;
}
