syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/dureq/dureq/gen/dureq/monitor/v1;monitorv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "dureq/monitor/v1/common.proto";

// Job represents a registered job with its schedule and state.
message Job {
  string id = 1;
  string task_type = 2;
  bytes payload = 3;
  Schedule schedule = 4;
  RetryPolicy retry_policy = 5;
  string status = 6;
  int32 attempt = 7;
  optional string last_error = 8;
  optional google.protobuf.Timestamp last_run_at = 9;
  optional google.protobuf.Timestamp next_run_at = 10;
  optional google.protobuf.Timestamp completed_at = 11;
  repeated string tags = 12;
  map<string, string> headers = 13;
  optional string unique_key = 14;
  optional int32 dlq_after = 15;
  optional string workflow_id = 16;
  optional string workflow_task = 17;
  optional string batch_id = 18;
  optional string batch_item = 19;
  optional string batch_role = 20;
  optional int32 priority = 21;
  optional google.protobuf.Duration schedule_to_start_timeout = 22;
  google.protobuf.Timestamp created_at = 23;
  google.protobuf.Timestamp updated_at = 24;
}

// JobRun represents an individual execution of a job.
message JobRun {
  string id = 1;
  string job_id = 2;
  string node_id = 3;
  string status = 4;
  int32 attempt = 5;
  optional string error = 6;
  google.protobuf.Timestamp started_at = 7;
  optional google.protobuf.Timestamp finished_at = 8;
  google.protobuf.Duration duration = 9;
  optional google.protobuf.Timestamp last_heartbeat_at = 10;
}

// BatchProgress is published in events for progress tracking.
message BatchProgress {
  string batch_id = 1;
  int32 done = 2;
  int32 total = 3;
  int32 failed = 4;
  string step = 5;
}

// JobEvent is a monitoring event.
message JobEvent {
  string type = 1;
  string job_id = 2;
  string run_id = 3;
  string node_id = 4;
  string task_type = 5;
  optional string error = 6;
  int32 attempt = 7;
  google.protobuf.Timestamp timestamp = 8;
  BatchProgress batch_progress = 9;
  repeated string affected_run_ids = 10;
}

// ScheduleEntry is the KV entry for schedule scanning.
message ScheduleEntry {
  string job_id = 1;
  google.protobuf.Timestamp next_run_at = 2;
  Schedule schedule = 3;
}

// WorkMessage represents a dead-letter queue entry.
message WorkMessage {
  string run_id = 1;
  string job_id = 2;
  string task_type = 3;
  bytes payload = 4;
  int32 attempt = 5;
  google.protobuf.Timestamp deadline = 6;
  map<string, string> metadata = 7;
  map<string, string> headers = 8;
  int32 priority = 9;
  google.protobuf.Timestamp dispatched_at = 10;
}

// --- Job RPC messages ---

message ListJobsRequest {
  PaginationRequest pagination = 1;
  optional string status = 2;
  optional string task_type = 3;
  optional string tag = 4;
  optional string search = 5;
}

message ListJobsResponse {
  repeated Job jobs = 1;
  int32 total = 2;
}

message GetJobRequest {
  string job_id = 1;
}

message GetJobResponse {
  Job job = 1;
}

message DeleteJobRequest {
  string job_id = 1;
}

message DeleteJobResponse {
  string job_id = 1;
}

message CancelJobRequest {
  string job_id = 1;
}

message CancelJobResponse {
  string job_id = 1;
}

message RetryJobRequest {
  string job_id = 1;
}

message RetryJobResponse {
  string job_id = 1;
}

message ListJobEventsRequest {
  string job_id = 1;
  int32 limit = 2;
}

message ListJobEventsResponse {
  repeated JobEvent events = 1;
}

message ListJobRunsRequest {
  string job_id = 1;
  int32 limit = 2;
}

message ListJobRunsResponse {
  repeated JobRun runs = 1;
}

message UpdateJobPayloadRequest {
  string job_id = 1;
  bytes payload = 2;
}

message UpdateJobPayloadResponse {
  string job_id = 1;
}

// --- Schedule RPC messages ---

message ListSchedulesRequest {
  PaginationRequest pagination = 1;
}

message ListSchedulesResponse {
  repeated ScheduleEntry schedules = 1;
  int32 total = 2;
}

message GetScheduleRequest {
  string job_id = 1;
}

message GetScheduleResponse {
  ScheduleEntry schedule = 1;
}

// --- Run RPC messages ---

message ListRunsRequest {}

message ListRunsResponse {
  repeated JobRun runs = 1;
}

message GetRunRequest {
  string run_id = 1;
}

message GetRunResponse {
  JobRun run = 1;
}

// --- History RPC messages ---

message ListHistoryRunsRequest {
  PaginationRequest pagination = 1;
  optional string status = 2;
  optional string job_id = 3;
}

message ListHistoryRunsResponse {
  repeated JobRun runs = 1;
  int32 total = 2;
}

message ListHistoryEventsRequest {
  int32 limit = 1;
  int32 offset = 2;
  optional string job_id = 3;
}

message ListHistoryEventsResponse {
  repeated JobEvent events = 1;
  int32 total = 2;
}

// --- DLQ RPC messages ---

message ListDLQRequest {
  PaginationRequest pagination = 1;
}

message ListDLQResponse {
  repeated WorkMessage messages = 1;
  int32 total = 2;
}
