syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/dureq/dureq/gen/dureq/monitor/v1;monitorv1";

import "google/protobuf/timestamp.proto";

// PoolStats captures worker pool metrics for a node.
message PoolStats {
  int32 running_workers = 1;
  int32 idle_workers = 2;
  int32 max_concurrency = 3;
  uint64 total_submitted = 4;
  uint64 total_completed = 5;
  uint64 total_failed = 6;
  int32 queue_length = 7;
}

// NodeInfo describes a registered server node.
message NodeInfo {
  string node_id = 1;
  string address = 2;
  repeated string task_types = 3;
  google.protobuf.Timestamp started_at = 4;
  google.protobuf.Timestamp last_heartbeat = 5;
  PoolStats pool_stats = 6;
  repeated string active_run_ids = 7;
}

// --- Node RPC messages ---

message ListNodesRequest {}

message ListNodesResponse {
  repeated NodeInfo nodes = 1;
}

message GetNodeRequest {
  string node_id = 1;
}

message GetNodeResponse {
  NodeInfo node = 1;
}
