syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/dureq/dureq/gen/dureq/monitor/v1;monitorv1";

import "dureq/monitor/v1/job.proto";
import "dureq/monitor/v1/workflow.proto";
import "dureq/monitor/v1/batch.proto";
import "dureq/monitor/v1/bulk.proto";
import "dureq/monitor/v1/node.proto";
import "dureq/monitor/v1/queue.proto";
import "dureq/monitor/v1/stats.proto";

// MonitorService provides read and management operations for the dureq scheduler.
service MonitorService {
  // --- Jobs ---
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc GetJob(GetJobRequest) returns (GetJobResponse);
  rpc DeleteJob(DeleteJobRequest) returns (DeleteJobResponse);
  rpc CancelJob(CancelJobRequest) returns (CancelJobResponse);
  rpc RetryJob(RetryJobRequest) returns (RetryJobResponse);
  rpc ListJobEvents(ListJobEventsRequest) returns (ListJobEventsResponse);
  rpc ListJobRuns(ListJobRunsRequest) returns (ListJobRunsResponse);
  rpc UpdateJobPayload(UpdateJobPayloadRequest) returns (UpdateJobPayloadResponse);

  // --- Schedules ---
  rpc ListSchedules(ListSchedulesRequest) returns (ListSchedulesResponse);
  rpc GetSchedule(GetScheduleRequest) returns (GetScheduleResponse);

  // --- Nodes ---
  rpc ListNodes(ListNodesRequest) returns (ListNodesResponse);
  rpc GetNode(GetNodeRequest) returns (GetNodeResponse);

  // --- Runs ---
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse);
  rpc GetRun(GetRunRequest) returns (GetRunResponse);

  // --- History ---
  rpc ListHistoryRuns(ListHistoryRunsRequest) returns (ListHistoryRunsResponse);
  rpc ListHistoryEvents(ListHistoryEventsRequest) returns (ListHistoryEventsResponse);

  // --- DLQ ---
  rpc ListDLQ(ListDLQRequest) returns (ListDLQResponse);

  // --- Workflows ---
  rpc ListWorkflows(ListWorkflowsRequest) returns (ListWorkflowsResponse);
  rpc GetWorkflow(GetWorkflowRequest) returns (GetWorkflowResponse);
  rpc CancelWorkflow(CancelWorkflowRequest) returns (CancelWorkflowResponse);
  rpc RetryWorkflow(RetryWorkflowRequest) returns (RetryWorkflowResponse);

  // --- Batches ---
  rpc ListBatches(ListBatchesRequest) returns (ListBatchesResponse);
  rpc GetBatch(GetBatchRequest) returns (GetBatchResponse);
  rpc GetBatchResults(GetBatchResultsRequest) returns (GetBatchResultsResponse);
  rpc GetBatchItemResult(GetBatchItemResultRequest) returns (GetBatchItemResultResponse);
  rpc CancelBatch(CancelBatchRequest) returns (CancelBatchResponse);
  rpc RetryBatch(RetryBatchRequest) returns (RetryBatchResponse);

  // --- Bulk Operations ---
  rpc BulkCancelJobs(BulkCancelJobsRequest) returns (BulkCancelJobsResponse);
  rpc BulkRetryJobs(BulkRetryJobsRequest) returns (BulkRetryJobsResponse);
  rpc BulkDeleteJobs(BulkDeleteJobsRequest) returns (BulkDeleteJobsResponse);
  rpc BulkCancelWorkflows(BulkCancelWorkflowsRequest) returns (BulkCancelWorkflowsResponse);
  rpc BulkRetryWorkflows(BulkRetryWorkflowsRequest) returns (BulkRetryWorkflowsResponse);
  rpc BulkDeleteWorkflows(BulkDeleteWorkflowsRequest) returns (BulkDeleteWorkflowsResponse);
  rpc BulkCancelBatches(BulkCancelBatchesRequest) returns (BulkCancelBatchesResponse);
  rpc BulkRetryBatches(BulkRetryBatchesRequest) returns (BulkRetryBatchesResponse);
  rpc BulkDeleteBatches(BulkDeleteBatchesRequest) returns (BulkDeleteBatchesResponse);

  // --- Groups ---
  rpc ListGroups(ListGroupsRequest) returns (ListGroupsResponse);

  // --- Queues ---
  rpc ListQueues(ListQueuesRequest) returns (ListQueuesResponse);
  rpc PauseQueue(PauseQueueRequest) returns (PauseQueueResponse);
  rpc ResumeQueue(ResumeQueueRequest) returns (ResumeQueueResponse);

  // --- Stats ---
  rpc GetStats(GetStatsRequest) returns (GetStatsResponse);
  rpc GetDailyStats(GetDailyStatsRequest) returns (GetDailyStatsResponse);
  rpc GetRedisInfo(GetRedisInfoRequest) returns (GetRedisInfoResponse);
  rpc GetSyncRetries(GetSyncRetriesRequest) returns (GetSyncRetriesResponse);

  // --- Health ---
  rpc Health(HealthRequest) returns (HealthResponse);
}
