syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/FDK0901/dureq/gen/dureq/monitor/v1;monitorv1";

// RedisInfoSection is a section from Redis INFO output.
message RedisInfoSection {
  map<string, string> entries = 1;
}

// DailyStatsEntry represents aggregated stats for one day.
message DailyStatsEntry {
  string date = 1;
  int64 processed = 2;
  int64 failed = 3;
}

// --- Stats RPC messages ---

message GetStatsRequest {}

message GetStatsResponse {
  map<string, int32> job_counts = 1;
  int32 active_schedules = 2;
  int32 active_runs = 3;
  int32 active_nodes = 4;
}

message GetDailyStatsRequest {
  int32 days = 1;
}

message GetDailyStatsResponse {
  repeated DailyStatsEntry entries = 1;
}

message GetRedisInfoRequest {
  string section = 1;
}

message GetRedisInfoResponse {
  map<string, RedisInfoSection> sections = 1;
}

message GetSyncRetriesRequest {}

message GetSyncRetriesResponse {
  // Opaque JSON blob since the SyncRetrier stats shape is dynamic.
  bytes data = 1;
}

message HealthRequest {}

message HealthResponse {
  string status = 1;
}
