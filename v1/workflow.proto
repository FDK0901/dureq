syntax = "proto3";
package dureq.monitor.v1;

option go_package = "github.com/FDK0901/dureq/gen/dureq/monitor/v1;monitorv1";

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";
import "dureq/monitor/v1/common.proto";

// WorkflowTaskState tracks the state of one task within a workflow instance.
message WorkflowTaskState {
  string name = 1;
  string job_id = 2;
  string status = 3;
  optional string error = 4;
  optional google.protobuf.Timestamp started_at = 5;
  optional google.protobuf.Timestamp finished_at = 6;
}

// WorkflowTask is one step in a workflow DAG definition.
message WorkflowTask {
  string name = 1;
  string task_type = 2;
  bytes payload = 3;
  repeated string depends_on = 4;
}

// WorkflowDefinition describes a DAG of tasks to execute.
message WorkflowDefinition {
  string name = 1;
  repeated WorkflowTask tasks = 2;
  optional google.protobuf.Duration execution_timeout = 3;
  RetryPolicy retry_policy = 4;
  optional int32 default_priority = 5;
}

// WorkflowInstance is a running instance of a workflow definition.
message WorkflowInstance {
  string id = 1;
  string workflow_name = 2;
  string status = 3;
  map<string, WorkflowTaskState> tasks = 4;
  WorkflowDefinition definition = 5;
  bytes input = 6;
  optional google.protobuf.Timestamp deadline = 7;
  int32 attempt = 8;
  int32 max_attempts = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
  optional google.protobuf.Timestamp completed_at = 12;
}

// --- Workflow RPC messages ---

message ListWorkflowsRequest {
  PaginationRequest pagination = 1;
  optional string status = 2;
}

message ListWorkflowsResponse {
  repeated WorkflowInstance workflows = 1;
  int32 total = 2;
}

message GetWorkflowRequest {
  string workflow_id = 1;
}

message GetWorkflowResponse {
  WorkflowInstance workflow = 1;
}

message CancelWorkflowRequest {
  string workflow_id = 1;
}

message CancelWorkflowResponse {
  string workflow_id = 1;
}

message RetryWorkflowRequest {
  string workflow_id = 1;
}

message RetryWorkflowResponse {
  string workflow_id = 1;
}
